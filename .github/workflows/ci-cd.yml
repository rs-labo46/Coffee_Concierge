name: Coffee Concierge CI/CD

on:
  pull_request:
    branches:
      - develop
      - main

  push:
    branches:
      - develop
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

  backend:
    name: Backend test and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Download backend dependencies
        run: go mod download

      - name: Run backend tests
        env:
          RUN_E2E: "0"
          RUN_RATE_LIMIT_E2E: "0"
          JWT_SECRET: ci-jwt-secret-must-be-long-enough-for-tests
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        run: go test ./... -count=1

      - name: Build backend
        run: go build ./...

  backend-docker:
    name: Backend Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Build backend Docker image
        run: docker build -f backend/Dockerfile backend

  deploy-production:
    name: Deploy production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - frontend
      - backend
      - backend-docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}

    steps:
      - name: Trigger Render deploy
        if: ${{ env.RENDER_DEPLOY_HOOK_URL != '' }}
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"

      - name: Trigger Vercel deploy
        if: ${{ env.VERCEL_DEPLOY_HOOK_URL != '' }}
        run: curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL"
